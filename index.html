<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genomic Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: { 500: '#f25f8c', 600: '#db3f75' },
              leaf: '#2f7d57',
              bark: '#5b4636',
              ink: '#221522'
            },
            boxShadow: {
              glow: '0 18px 55px rgba(242, 95, 140, 0.28)'
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        min-height: 100vh;
        font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
        color: #221522;
        background:
          radial-gradient(circle at 12% 15%, rgba(242, 95, 140, 0.16), transparent 34%),
          radial-gradient(circle at 88% 8%, rgba(47, 125, 87, 0.16), transparent 32%),
          linear-gradient(135deg, #fff7fb 0%, #f7f3e9 46%, #edf7f1 100%);
      }
      .glass {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.66);
        backdrop-filter: blur(16px);
      }
      .gradient-text {
        background: linear-gradient(120deg, #db3f75, #2f7d57);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
      const { useRef, useState } = React;
      const { createRoot } = ReactDOM;

      const Icon = ({ children, size = 22, className = '' }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {children}
        </svg>
      );
      const Upload = (props) => <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m17 8-5-5-5 5" /><path d="M12 3v12" /></Icon>;
      const Flower = (props) => <Icon {...props}><path d="M12 5a3 3 0 1 1 3 3" /><path d="M12 8a3 3 0 1 1-3 3" /><path d="M12 11a3 3 0 1 1 3 3" /><path d="M12 8a3 3 0 1 0-3 3" /><circle cx="12" cy="8" r="2" /></Icon>;
      const Alert = (props) => <Icon {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" /><path d="M12 9v4" /><path d="M12 17h.01" /></Icon>;
      const Sparkles = (props) => <Icon {...props}><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z" /></Icon>;
      const Leaf = (props) => <Icon {...props}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.5 19 2c1 2 2 4.2 2 8 0 5.5-4.8 10-10 10Z" /><path d="M2 21c0-3 1.9-5.4 5.1-6C9.5 14.5 12 13 13 12" /></Icon>;
      const Droplets = (props) => <Icon {...props}><path d="M7 16.3c2.2 0 4-1.8 4-4.1 0-1.2-.6-2.3-1.7-3.2S7.3 6.8 7 5.3C6.7 6.8 5.9 8.1 4.7 9S3 11.1 3 12.3c0 2.2 1.8 4 4 4Z" /><path d="M12.6 6.6A11 11 0 0 0 14 3c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a7 7 0 0 1-11.9 5" /></Icon>;
      const Scissors = (props) => <Icon {...props}><circle cx="6" cy="6" r="3" /><circle cx="18" cy="6" r="3" /><path d="M8 12h8" /><path d="M6 20h12" /></Icon>;
      const Palette = (props) => <Icon {...props}><circle cx="13.5" cy="6.5" r=".5" /><circle cx="17.5" cy="10.5" r=".5" /><circle cx="8.5" cy="7.5" r=".5" /><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.7-.7 1.7-1.7 0-.4-.2-.8-.4-1.1-.3-.3-.4-.7-.4-1.1a1.6 1.6 0 0 1 1.7-1.7h2c3 0 5.5-2.5 5.5-5.6C22 6 17.5 2 12 2Z" /></Icon>;
      const Download = (props) => <Icon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><path d="m7 10 5 5 5-5" /><path d="M12 15V3" /></Icon>;
      const Refresh = (props) => <Icon {...props}><path d="M21 12a9 9 0 0 1-15.3 6.4" /><path d="M3 12A9 9 0 0 1 18.3 5.6" /><path d="M18 2v4h-4" /><path d="M6 22v-4h4" /></Icon>;

      const flowerDatabase = {
        rose: {
          species: 'Rosa damascena',
          match: ['rose', 'hip', 'red flower', 'pink flower'],
          colors: ['#ff6b9d', '#ffb5c5', '#fff0f5', '#8b4a8b', '#4a2c4a'],
          compounds: [{ name: 'Geraniol', value: 34 }, { name: 'Citronellol', value: 23 }, { name: 'Nerol', value: 19 }, { name: 'Linalool', value: 12 }],
          notes: 'Fresh citrus, rose floral, soft musk',
          story: 'A classic aromatic bloom used in skincare, fragrance, teas, and natural color work.',
          usesBefore: [
            ['Rose water toner', Droplets, 'Steep clean fresh petals in distilled water for a gentle floral toner.'],
            ['Fresh edible petals', Flower, 'Use pesticide-free petals for salads, desserts, syrups, and garnishes.'],
            ['Hair rinse', Scissors, 'A light rose infusion can add shine and a soft floral scent after washing.']
          ],
          usesAfter: [
            ['Rose hair tint', Scissors, 'Dried petals can be steeped into a mild pink rinse for light hair.'],
            ['Potpourri', Leaf, 'Blend dry petals with spices and essential oils for a long-lasting room scent.'],
            ['Infused body oil', Droplets, 'Infuse dried petals in jojoba or almond oil for skin and hair care.']
          ]
        },
        lavender: {
          species: 'Lavandula angustifolia',
          match: ['lavender'],
          colors: ['#967bb6', '#e6e6fa', '#dda0dd', '#9370db', '#663399'],
          compounds: [{ name: 'Linalool', value: 45 }, { name: 'Linalyl acetate', value: 29 }, { name: 'Camphor', value: 12 }, { name: 'Terpinen-4-ol', value: 8 }],
          notes: 'Clean herbal, soft floral, woody earth',
          story: 'A calming Mediterranean flower valued for sleep support, fragrance, and gentle household uses.',
          usesBefore: [
            ['Fresh bath bundle', Droplets, 'Add clean sprigs to bath water for a calming aromatic soak.'],
            ['Culinary garnish', Flower, 'Use food-safe flowers sparingly in honey, biscuits, lemonade, or tea.'],
            ['Scalp oil', Scissors, 'Infuse fresh lavender in coconut or olive oil for a soothing scalp massage.']
          ],
          usesAfter: [
            ['Sleep sachets', Leaf, 'Fill small fabric pouches with dried buds for wardrobes and pillows.'],
            ['Hair rinse', Scissors, 'Steep dried lavender in warm water, cool, and use as a final rinse.'],
            ['Candles and soap', Sparkles, 'Add dry buds to handmade candles or soaps for fragrance and texture.']
          ]
        },
        sunflower: {
          species: 'Helianthus annuus',
          match: ['sunflower', 'daisy'],
          colors: ['#ffd700', '#ffa500', '#ff8c00', '#8b4513', '#654321'],
          compounds: [{ name: 'Terpenoids', value: 39 }, { name: 'Phenolic acids', value: 25 }, { name: 'Flavonoids', value: 19 }, { name: 'Carotenoids', value: 12 }],
          notes: 'Warm, nutty, green, earthy',
          story: 'A bright seed-bearing flower with practical value for food, oil, dye, and garden ecology.',
          usesBefore: [
            ['Seed harvest', Flower, 'Mature heads can be harvested for roasting or pressing into oil.'],
            ['Natural dye', Palette, 'Fresh yellow petals can tint paper, yarn, or small fabric samples.'],
            ['Pollinator support', Leaf, 'Keep blooms outdoors to feed bees, butterflies, and seed-eating birds.']
          ],
          usesAfter: [
            ['Sunflower oil', Droplets, 'Press dry seeds for culinary oil or simple skin and hair oil blends.'],
            ['Bird feeder', Leaf, 'Hang dried heads outside as a natural bird feeder.'],
            ['Compost and mulch', Leaf, 'Chop dry stalks and leaves into compost or garden mulch.']
          ]
        },
        marigold: {
          species: 'Tagetes / Calendula group',
          match: ['marigold', 'calendula', 'yellow flower', 'orange flower'],
          colors: ['#ffa500', '#ffd700', '#ff6347', '#8b4513', '#654321'],
          compounds: [{ name: 'Lutein', value: 43 }, { name: 'Zeaxanthin', value: 28 }, { name: 'Quercetin', value: 16 }, { name: 'Beta-carotene', value: 9 }],
          notes: 'Spicy, herbal, citrus, earthy',
          story: 'A resilient orange flower used for dye, skin balms, companion planting, and festive decoration.',
          usesBefore: [
            ['Pest companion', Leaf, 'Place fresh marigolds near vegetables to help discourage some garden pests.'],
            ['Golden hair rinse', Scissors, 'Petal tea can add a warm golden cast to light hair.'],
            ['Edible garnish', Flower, 'Use food-safe petals for soups, rice, and salads.']
          ],
          usesAfter: [
            ['Fabric dye', Palette, 'Dried petals produce yellow and orange tones for natural dye projects.'],
            ['Calendula balm', Droplets, 'Infuse dried petals in oil and blend with beeswax for a skin balm.'],
            ['Tea blend', Leaf, 'Dried petals can be used in small amounts for herbal tea blends.']
          ]
        },
        hibiscus: {
          species: 'Hibiscus rosa-sinensis',
          match: ['hibiscus', 'red flower', 'pink flower'],
          colors: ['#ff1493', '#ff69b4', '#ffc0cb', '#dc143c', '#8b0000'],
          compounds: [{ name: 'Anthocyanins', value: 39 }, { name: 'Flavonoids', value: 25 }, { name: 'Vitamin C', value: 18 }, { name: 'Polyphenols', value: 14 }],
          notes: 'Tart fruit, sweet floral, earthy spice',
          story: 'A tropical flower famous for bright teas, natural color, hair masks, and edible syrups.',
          usesBefore: [
            ['Fresh hibiscus tea', Leaf, 'Steep clean flowers for a tart red drink rich in botanical color.'],
            ['Hair mask', Scissors, 'Blend petals into a paste for a conditioning pre-wash mask.'],
            ['Natural lip stain', Droplets, 'Crushed petals can give a temporary pink-red tint.']
          ],
          usesAfter: [
            ['Red hair rinse', Scissors, 'Dried flowers make a red-pink conditioning rinse for darker or warm-toned hair.'],
            ['Syrup', Droplets, 'Simmer dried flowers with sugar and water for drinks and desserts.'],
            ['Paper dye', Palette, 'Use the concentrated tea to tint paper or craft materials.']
          ]
        },
        jasmine: {
          species: 'Jasminum officinale',
          match: ['jasmine', 'white flower'],
          colors: ['#ffffff', '#fff8dc', '#f5f5dc', '#ffffe0', '#fffaf0'],
          compounds: [{ name: 'Benzyl acetate', value: 36 }, { name: 'Linalool', value: 27 }, { name: 'Indole', value: 19 }, { name: 'Jasmone', value: 12 }],
          notes: 'Green, sweet floral, honeyed balsam',
          story: 'A night-fragrant bloom treasured for tea, perfume, hair rinses, and relaxing botanical products.',
          usesBefore: [
            ['Jasmine tea', Leaf, 'Layer clean flowers with green tea for a gentle floral infusion.'],
            ['Hair perfume rinse', Scissors, 'Use jasmine-infused water as a fragrant final rinse.'],
            ['Massage oil', Droplets, 'Steep petals in a carrier oil for a delicate aromatic oil.']
          ],
          usesAfter: [
            ['Dry tea blend', Leaf, 'Dried flowers can perfume tea blends and calming herbal mixes.'],
            ['Potpourri', Flower, 'Mix dried jasmine with rose and lavender for a soft floral room scent.'],
            ['Scented candles', Sparkles, 'Embed dried flowers into candles for decoration and subtle aroma.']
          ]
        }
      };

      const genericFlowerProfile = {
        species: 'Verified flower - species needs confirmation',
        match: [],
        colors: ['#f25f8c', '#f8c8d8', '#ffffff', '#2f7d57', '#5b4636'],
        compounds: [{ name: 'Floral volatiles', value: 32 }, { name: 'Pigments', value: 26 }, { name: 'Plant waxes', value: 18 }, { name: 'Polyphenols', value: 14 }],
        notes: 'Fresh floral, green botanical, soft earthy dry-down',
        story: 'This image passed the flower check. Confirm the flower name below to make the recommendations more specific and avoid wrong species claims.',
        usesBefore: [
          ['Fresh display', Flower, 'Keep clean blooms in fresh water and remove damaged petals to extend vase life.'],
          ['Petal craft', Palette, 'Use petals for pressed art, paper decoration, or natural color tests.'],
          ['Gentle aroma bowl', Droplets, 'Float clean petals in water for a short-lived natural fragrance display.']
        ],
        usesAfter: [
          ['Compost booster', Leaf, 'Add untreated dried petals and stems to compost after removing wires, ribbon, and plastic.'],
          ['Dry craft material', Sparkles, 'Press or dry petals for bookmarks, cards, labels, and decorative trays.'],
          ['Potpourri base', Flower, 'Mix dried petals with herbs and a few drops of essential oil for a room sachet.']
        ]
      };

      const flowerWords = [
        'flower', 'daisy', 'sunflower', 'rose', 'lavender', 'marigold', 'calendula',
        'hibiscus', 'jasmine', 'orchid', 'lily', 'lotus', 'poppy', 'tulip', 'petal', 'bouquet',
        'yellow lady', 'cardoon'
      ];
      const rejectWords = [
        'person', 'man', 'woman', 'boy', 'girl', 'face', 'hair', 'hand', 'dog', 'cat', 'car',
        'truck', 'bus', 'bottle', 'cup', 'phone', 'laptop', 'chair', 'table', 'shoe', 'bag',
        'keyboard', 'screen', 'building', 'food', 'plate'
      ];

      let modelPromise = null;
      const loadClassifier = () => {
        if (!modelPromise) {
          modelPromise = mobilenet.load({ version: 2, alpha: 0.5 });
        }
        return modelPromise;
      };

      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => loadClassifier().catch(() => null));
      } else {
        setTimeout(() => loadClassifier().catch(() => null), 900);
      }

      const loadImage = (src) =>
        new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });

      const isFlowerPrediction = (label) => flowerWords.some((word) => label.includes(word));
      const isRejectedPrediction = (label) => rejectWords.some((word) => label.includes(word));

      const resizeImage = async (imageSrc, maxSize = 640) => {
        const img = await loadImage(imageSrc);
        const scale = Math.min(1, maxSize / Math.max(img.naturalWidth, img.naturalHeight));
        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(img.naturalWidth * scale));
        canvas.height = Math.max(1, Math.round(img.naturalHeight * scale));
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.86);
      };

      const classifyFlower = async (imageSrc) => {
        const [model, img] = await Promise.all([loadClassifier(), loadImage(imageSrc)]);
        const predictions = await model.classify(img, 8);
        const normalized = predictions.map((p) => ({
          label: p.className.toLowerCase(),
          score: p.probability
        }));
        const flowerScore = normalized.filter((p) => isFlowerPrediction(p.label)).reduce((sum, p) => sum + p.score, 0);
        const rejected = normalized.find((p) => p.score > 0.2 && isRejectedPrediction(p.label));
        const top = normalized[0];
        const accepted = flowerScore >= 0.18 || (top && isFlowerPrediction(top.label) && top.score >= 0.12);
        return { accepted: accepted && !rejected, predictions: normalized, flowerScore, rejected };
      };

      const guessFlowerData = ({ predictions }) => {
        const text = predictions.map((p) => p.label).join(' ');
        const found = Object.values(flowerDatabase).find((flower) => flower.match.some((word) => text.includes(word)));
        return found || null;
      };

      const findKnownFlowerByName = (name) => {
        const clean = name.trim().toLowerCase();
        if (!clean) return null;
        return Object.values(flowerDatabase).find((flower) => {
          const species = flower.species.toLowerCase();
          return species.includes(clean) || flower.match.some((word) => clean.includes(word) || word.includes(clean));
        });
      };

      const buildFlowerProfile = (name, suggestedFlower) => {
        const cleanName = name.trim();
        if (!cleanName) return suggestedFlower || genericFlowerProfile;
        const known = findKnownFlowerByName(cleanName);
        if (known) {
          return { ...known, species: cleanName };
        }
        return {
          ...genericFlowerProfile,
          species: cleanName,
          story: `${cleanName} is confirmed by the user as the flower name. The app gives safe, broadly useful flower reuse ideas and links for deeper online verification.`
        };
      };

      const createDriedPreview = (imageSrc, callback) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          for (let i = 0; i < data.length; i += 4) {
            const gray = data[i] * 0.3 + data[i + 1] * 0.59 + data[i + 2] * 0.11;
            data[i] = Math.min(255, gray * 0.62 + 46);
            data[i + 1] = Math.min(255, gray * 0.55 + 34);
            data[i + 2] = Math.min(255, gray * 0.45 + 22);
          }
          ctx.putImageData(imageData, 0, 0);
          callback(canvas.toDataURL('image/jpeg', 0.92));
        };
        img.src = imageSrc;
      };

      const Button = ({ icon: IconComp, children, onClick, variant = 'primary', disabled = false }) => {
        const variants = {
          primary: 'bg-primary-600 text-white shadow-glow hover:bg-primary-500',
          soft: 'bg-white/75 border border-white/80 text-ink hover:bg-white'
        };
        return (
          <button disabled={disabled} onClick={onClick} className={`inline-flex items-center justify-center gap-2 rounded-xl px-4 py-3 text-sm font-semibold transition disabled:cursor-not-allowed disabled:opacity-60 ${variants[variant]}`}>
            <IconComp size={18} />
            {children}
          </button>
        );
      };

      const UseCard = ({ item, kind }) => {
        const [title, IconComp, body] = item;
        return (
          <article className="glass rounded-lg p-4 shadow-sm">
            <div className="flex gap-3">
              <div className={`h-11 w-11 shrink-0 rounded-lg flex items-center justify-center ${kind === 'fresh' ? 'bg-leaf/12 text-leaf' : 'bg-bark/12 text-bark'}`}>
                <IconComp />
              </div>
              <div>
                <div className="flex flex-wrap items-center gap-2">
                  <h3 className="font-semibold">{title}</h3>
                  <span className={`rounded-full px-2 py-0.5 text-xs font-semibold ${kind === 'fresh' ? 'bg-leaf/10 text-leaf' : 'bg-bark/10 text-bark'}`}>{kind === 'fresh' ? 'Fresh' : 'Dried'}</span>
                </div>
                <p className="mt-2 text-sm leading-relaxed text-slate-600">{body}</p>
              </div>
            </div>
          </article>
        );
      };

      const getImpactProfile = (flower, predictions) => {
        const topPrediction = predictions[0];
        const confidence = topPrediction ? Math.round(topPrediction.score * 100) : 0;
        const bestFresh = flower.usesBefore[0]?.[0] || 'Fresh botanical use';
        const bestDried = flower.usesAfter[0]?.[0] || 'Dried botanical reuse';
        const reuseScore = Math.min(98, 70 + flower.usesAfter.length * 6 + flower.usesBefore.length * 3);
        return {
          confidence,
          bestFresh,
          bestDried,
          reuseScore,
          savedWaste: `${flower.usesAfter.length + flower.usesBefore.length} reuse paths`,
          safety:
            'Use only clean, pesticide-free flowers for skin, hair, tea, or edible products. Avoid unknown roadside or chemically treated flowers.'
        };
      };

      const ImpactCard = ({ label, value, detail, icon: IconComp }) => (
        <article className="glass rounded-lg p-4 shadow-sm">
          <div className="mb-3 flex h-11 w-11 items-center justify-center rounded-lg bg-leaf/10 text-leaf">
            <IconComp />
          </div>
          <p className="text-xs font-semibold uppercase tracking-[0.16em] text-slate-500">{label}</p>
          <p className="mt-2 text-2xl font-bold text-ink">{value}</p>
          <p className="mt-1 text-sm leading-relaxed text-slate-600">{detail}</p>
        </article>
      );

      const ResearchLink = ({ href, label, detail }) => (
        <a href={href} target="_blank" rel="noreferrer" className="rounded-lg border border-white/70 bg-white/75 p-4 shadow-sm transition hover:-translate-y-0.5 hover:bg-white">
          <p className="font-bold text-ink">{label}</p>
          <p className="mt-1 text-sm leading-relaxed text-slate-600">{detail}</p>
        </a>
      );

      const App = () => {
        const fileRef = useRef(null);
        const [phase, setPhase] = useState('upload');
        const [fileName, setFileName] = useState('');
        const [image, setImage] = useState('');
        const [driedImage, setDriedImage] = useState('');
        const [flower, setFlower] = useState(genericFlowerProfile);
        const [flowerNameInput, setFlowerNameInput] = useState('');
        const [predictions, setPredictions] = useState([]);
        const [error, setError] = useState('');

        const reset = () => {
          setPhase('upload');
          setFileName('');
          setImage('');
          setDriedImage('');
          setFlower(genericFlowerProfile);
          setFlowerNameInput('');
          setPredictions([]);
          setError('');
          if (fileRef.current) fileRef.current.value = '';
        };

        const handleUpload = (event) => {
          const file = event.target.files?.[0];
          if (!file) return;
          if (!file.type.startsWith('image/')) {
            setError('Please upload an image file of a flower.');
            setPhase('error');
            return;
          }
          if (file.size > 10 * 1024 * 1024) {
            setError('This image is larger than 10MB. Please upload a smaller flower photo.');
            setPhase('error');
            return;
          }

          setFileName(file.name);
          setError('');
          setPhase('checking');
          const reader = new FileReader();
          reader.onloadend = async () => {
            try {
              const src = await resizeImage(reader.result);
              const result = await classifyFlower(src);
              setPredictions(result.predictions);
              if (!result.accepted) {
                const topGuess = result.predictions[0]?.label || 'unknown object';
                setImage('');
                setDriedImage('');
                setError(`This looks like "${topGuess}", not a flower. Please upload a clear photo where a flower is the main subject.`);
                setPhase('error');
                return;
              }

              const matchedFlower = guessFlowerData(result) || genericFlowerProfile;
              setFlower(matchedFlower);
              setFlowerNameInput(matchedFlower === genericFlowerProfile ? '' : matchedFlower.species);
              setImage(src);
              createDriedPreview(src, setDriedImage);
              setPhase('results');
            } catch (err) {
              setError('The flower detector could not load or read this image. Check your internet connection and try again.');
              setPhase('error');
            }
          };
          reader.readAsDataURL(file);
        };

        const activeFlower = buildFlowerProfile(flowerNameInput, flower);
        const researchQuery = encodeURIComponent(activeFlower.species);
        const socialTag = activeFlower.species.toLowerCase().replace(/[^a-z0-9]+/g, '');

        const downloadGuide = () => {
          const lines = [
            `FLOWER USES GUIDE: ${activeFlower.species}`,
            '='.repeat(54),
            '',
            'FRESH FLOWER USES',
            ...activeFlower.usesBefore.flatMap(([title, _icon, body], index) => [`${index + 1}. ${title}`, `   ${body}`, '']),
            'DRIED / WASTED FLOWER USES',
            ...activeFlower.usesAfter.flatMap(([title, _icon, body], index) => [`${index + 1}. ${title}`, `   ${body}`, '']),
            'FLOWER PROFILE',
            `Colors: ${activeFlower.colors.join(', ')}`,
            `Scent notes: ${activeFlower.notes}`,
            `Generated: ${new Date().toLocaleDateString()}`
          ];
          const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = `${activeFlower.species.toLowerCase().replace(/[^a-z0-9]+/g, '-')}-uses-guide.txt`;
          link.click();
          URL.revokeObjectURL(link.href);
        };

        const impact = getImpactProfile(activeFlower, predictions);

        return (
          <div className="mx-auto max-w-6xl px-4 pb-14">
            <header className="sticky top-4 z-10 pt-4">
              <div className="glass flex flex-wrap items-center justify-between gap-3 rounded-lg px-5 py-4 shadow-glow">
                <div className="flex items-center gap-3">
                  <div className="flex h-11 w-11 items-center justify-center rounded-lg bg-primary-600 text-white">
                    <Flower />
                  </div>
                  <div>
                    <p className="text-xs font-bold uppercase tracking-[0.22em] text-slate-600">Genomic Lab</p>
                    <p className="text-xl font-bold">Genomic Lab</p>
                  </div>
                </div>
                <Button icon={Refresh} onClick={reset} variant="soft">Reset</Button>
              </div>
            </header>

            <main className="mt-8 space-y-6">
              <section className="glass rounded-lg p-6 shadow-lg">
                <div className="grid gap-6 lg:grid-cols-[1.3fr_0.7fr] lg:items-center">
                  <div>
                    <p className="mb-2 text-sm font-bold text-leaf">Genomic Lab</p>
                    <h1 className="text-4xl font-bold leading-tight md:text-5xl">
                      Upload a flower. Get safe, useful <span className="gradient-text">fresh and dried flower uses.</span>
                    </h1>
                    <p className="mt-4 max-w-2xl text-lg leading-relaxed text-slate-700">
                      Fast flower checking, user-confirmed flower naming, reuse ideas, safety notes, and online verification links in one clear workspace.
                    </p>
                    <div className="mt-5 flex flex-wrap gap-2">
                      <span className="rounded-full bg-leaf/10 px-3 py-1 text-xs font-bold text-leaf">Fast preload</span>
                      <span className="rounded-full bg-primary-500/10 px-3 py-1 text-xs font-bold text-primary-600">Wrong-name protection</span>
                      <span className="rounded-full bg-bark/10 px-3 py-1 text-xs font-bold text-bark">Reuse planner</span>
                    </div>
                  </div>
                  <div className="rounded-lg bg-white/70 p-4">
                    <button onClick={() => fileRef.current?.click()} className="flex min-h-52 w-full flex-col items-center justify-center rounded-lg border border-dashed border-primary-500/60 bg-white/70 p-5 text-center transition hover:bg-white">
                      <div className="mb-3 flex h-14 w-14 items-center justify-center rounded-lg bg-primary-500/12 text-primary-600">
                        <Upload size={28} />
                      </div>
                      <p className="font-semibold">{fileName || 'Choose a flower image'}</p>
                      <p className="mt-1 text-sm text-slate-600">JPEG, PNG, or WebP up to 10MB</p>
                    </button>
                    <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleUpload} />
                  </div>
                </div>
              </section>

              <section className="grid gap-3 md:grid-cols-4">
                <article className="glass rounded-lg p-4 shadow-sm">
                  <Flower className="mb-3 text-primary-600" />
                  <p className="font-bold">Flower-only gate</p>
                  <p className="mt-1 text-sm text-slate-600">Blocks people, objects, food, and random scenes before showing uses.</p>
                </article>
                <article className="glass rounded-lg p-4 shadow-sm">
                  <Sparkles className="mb-3 text-primary-600" />
                  <p className="font-bold">Name correction</p>
                  <p className="mt-1 text-sm text-slate-600">Users can confirm the exact flower name instead of trusting a weak guess.</p>
                </article>
                <article className="glass rounded-lg p-4 shadow-sm">
                  <Leaf className="mb-3 text-leaf" />
                  <p className="font-bold">Reuse planner</p>
                  <p className="mt-1 text-sm text-slate-600">Shows fresh and dried uses, impact score, and best next action.</p>
                </article>
                <article className="glass rounded-lg p-4 shadow-sm">
                  <Droplets className="mb-3 text-leaf" />
                  <p className="font-bold">Global research</p>
                  <p className="mt-1 text-sm text-slate-600">Links to plant communities, image search, Wikipedia, and social tags.</p>
                </article>
              </section>

              {phase === 'upload' && (
                <section className="glass rounded-lg p-6 text-center shadow-sm">
                  <Flower size={44} className="mx-auto mb-3 text-primary-600" />
                  <p className="text-2xl font-semibold">Ready for a flower photo</p>
                  <p className="mt-2 text-slate-600">Only valid flower images continue. Exact flower names can be confirmed or corrected before the guide is made.</p>
                </section>
              )}

              {phase === 'checking' && (
                <section className="glass rounded-lg p-8 text-center shadow-sm">
                  <div className="mx-auto mb-4 h-16 w-16 animate-spin rounded-full border-4 border-primary-500/25 border-t-primary-600"></div>
                  <p className="text-xl font-semibold">Checking whether this is a flower...</p>
                  <p className="mt-2 text-slate-600">Using fast mode: resized image, preloaded model, and flower-only gate.</p>
                </section>
              )}

              {phase === 'error' && (
                <section className="rounded-lg border border-red-200 bg-red-50 p-6 shadow-sm">
                  <div className="flex flex-col gap-4 md:flex-row md:items-start">
                    <div className="flex h-12 w-12 shrink-0 items-center justify-center rounded-lg bg-red-100 text-red-700">
                      <Alert />
                    </div>
                    <div className="flex-1">
                      <h2 className="text-2xl font-bold text-red-900">Not a flower</h2>
                      <p className="mt-2 text-red-800">{error}</p>
                      {predictions.length > 0 && (
                        <div className="mt-4 rounded-lg bg-white/70 p-3">
                          <p className="mb-2 text-xs font-semibold uppercase tracking-[0.18em] text-red-700">Detector saw</p>
                          <div className="flex flex-wrap gap-2">
                            {predictions.slice(0, 5).map((p) => (
                              <span key={p.label} className="rounded-full bg-red-100 px-3 py-1 text-xs font-semibold text-red-800">
                                {p.label} {(p.score * 100).toFixed(0)}%
                              </span>
                            ))}
                          </div>
                        </div>
                      )}
                      <div className="mt-5">
                        <Button icon={Upload} onClick={() => fileRef.current?.click()}>Upload a flower</Button>
                      </div>
                    </div>
                  </div>
                </section>
              )}

              {phase === 'results' && (
                <section className="space-y-6">
                  <div className="grid gap-4 lg:grid-cols-5">
                    <div className="glass rounded-lg p-5 shadow-sm lg:col-span-3">
                      <div className="mb-4 flex flex-wrap items-center justify-between gap-3">
                        <div>
                          <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-600">Accepted flower image</p>
                          <h2 className="text-2xl font-bold">{activeFlower.species}</h2>
                        </div>
                        <span className="rounded-full bg-leaf/12 px-3 py-1 text-xs font-bold text-leaf">FLOWER VERIFIED</span>
                      </div>
                      <div className="grid gap-3 sm:grid-cols-2">
                        <div className="relative overflow-hidden rounded-lg bg-white">
                          <img src={image} alt="Uploaded flower" className="h-72 w-full object-cover" />
                          <span className="absolute left-3 top-3 rounded-full bg-black/65 px-3 py-1 text-xs font-semibold text-white">Fresh / uploaded</span>
                        </div>
                        <div className="relative overflow-hidden rounded-lg bg-white">
                          {driedImage ? <img src={driedImage} alt="Dried flower preview" className="h-72 w-full object-cover" /> : <div className="flex h-72 items-center justify-center text-slate-500">Preparing dried preview</div>}
                          <span className="absolute left-3 top-3 rounded-full bg-bark px-3 py-1 text-xs font-semibold text-white">Dried preview</span>
                        </div>
                      </div>
                    </div>

                    <div className="glass rounded-lg p-5 shadow-sm lg:col-span-2">
                      <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-600">Color memory</p>
                      <div className="mt-3 grid grid-cols-5 gap-2">
                        {activeFlower.colors.map((color) => (
                          <div key={color}>
                            <div className="h-14 rounded-lg border border-white shadow-inner" style={{ background: color }}></div>
                            <p className="mt-1 text-[11px] font-semibold text-slate-600">{color}</p>
                          </div>
                        ))}
                      </div>
                      <div className="mt-5 rounded-lg bg-white/65 p-4">
                        <p className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-600">Scent profile</p>
                        <p className="mt-2 font-semibold">{activeFlower.notes}</p>
                      </div>
                      <div className="mt-4 rounded-lg bg-white/65 p-4">
                        <p className="text-xs font-semibold uppercase tracking-[0.18em] text-slate-600">Detector confidence</p>
                        <div className="mt-2 flex flex-wrap gap-2">
                          {predictions.slice(0, 3).map((p) => (
                            <span key={p.label} className="rounded-full bg-leaf/10 px-3 py-1 text-xs font-semibold text-leaf">
                              {p.label} {(p.score * 100).toFixed(0)}%
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="glass rounded-lg p-5 shadow-sm">
                    <div className="grid gap-4 lg:grid-cols-[0.9fr_1.1fr] lg:items-center">
                      <div>
                        <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-600">Exact name control</p>
                        <h2 className="mt-1 text-2xl font-bold">Confirm the flower name</h2>
                        <p className="mt-2 text-sm leading-relaxed text-slate-600">
                          The app verifies the image is a flower first. For the exact species, confirm the name here or use the research links below.
                        </p>
                      </div>
                      <div>
                        <label className="text-sm font-bold text-slate-700" htmlFor="flower-name">Flower name</label>
                        <div className="mt-2 flex flex-col gap-2 sm:flex-row">
                          <input
                            id="flower-name"
                            value={flowerNameInput}
                            onChange={(event) => setFlowerNameInput(event.target.value)}
                            placeholder="Type exact flower name, e.g. orchid, lotus, tulip"
                            className="min-h-12 flex-1 rounded-lg border border-white/80 bg-white/85 px-4 text-sm font-semibold outline-none ring-primary-500/30 transition focus:ring-4"
                          />
                          <Button icon={Sparkles} onClick={() => setFlowerNameInput(activeFlower.species)} variant="soft">Use name</Button>
                        </div>
                        <div className="mt-3 flex flex-wrap gap-2">
                          {Object.values(flowerDatabase).map((item) => (
                            <button
                              key={item.species}
                              onClick={() => setFlowerNameInput(item.species)}
                              className="rounded-full bg-white/80 px-3 py-1 text-xs font-bold text-slate-700 transition hover:bg-white"
                            >
                              {item.species.split(' ')[0]}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="grid gap-3 md:grid-cols-4">
                    <ImpactCard
                      icon={Sparkles}
                      label="AI confidence"
                      value={`${impact.confidence}%`}
                      detail="Top visual match from the flower gate."
                    />
                    <ImpactCard
                      icon={Leaf}
                      label="Reuse impact"
                      value={`${impact.reuseScore}/100`}
                      detail="Fresh and dried use potential for this flower."
                    />
                    <ImpactCard
                      icon={Flower}
                      label="Best fresh use"
                      value={impact.bestFresh}
                      detail="Most practical use before the bloom is wasted."
                    />
                    <ImpactCard
                      icon={Droplets}
                      label="Best dried use"
                      value={impact.bestDried}
                      detail={impact.savedWaste}
                    />
                  </div>

                  <div className="rounded-lg border border-amber-200 bg-amber-50 p-4 shadow-sm">
                    <div className="flex gap-3">
                      <Alert className="mt-0.5 shrink-0 text-amber-700" />
                      <div>
                        <p className="font-bold text-amber-900">Safety check</p>
                        <p className="mt-1 text-sm leading-relaxed text-amber-900">{impact.safety}</p>
                      </div>
                    </div>
                  </div>

                  <div className="grid gap-4 lg:grid-cols-2">
                    <div className="glass rounded-lg p-5 shadow-sm">
                      <div className="mb-4 flex items-center gap-3">
                        <Droplets className="text-primary-600" />
                        <h2 className="text-2xl font-bold">Compound distribution</h2>
                      </div>
                      <div className="space-y-4">
                        {activeFlower.compounds.map((compound) => (
                          <div key={compound.name}>
                            <div className="mb-1 flex justify-between text-sm font-semibold">
                              <span>{compound.name}</span>
                              <span className="text-primary-600">{compound.value}%</span>
                            </div>
                            <div className="h-3 overflow-hidden rounded-full bg-white">
                              <div className="h-full rounded-full bg-gradient-to-r from-primary-500 to-leaf" style={{ width: `${compound.value}%` }}></div>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="rounded-lg border border-white/70 bg-gradient-to-br from-primary-500/12 via-white/85 to-leaf/12 p-5 shadow-sm">
                      <div className="mb-3 flex items-center gap-3">
                        <Sparkles className="text-primary-600" />
                        <h2 className="text-2xl font-bold">Flower profile</h2>
                      </div>
                      <p className="text-lg leading-relaxed text-slate-800">{activeFlower.story}</p>
                    </div>
                  </div>

                  <div className="glass rounded-lg p-5 shadow-sm">
                    <div className="mb-4">
                      <p className="text-xs font-semibold uppercase tracking-[0.2em] text-slate-600">Global verification</p>
                      <h2 className="text-2xl font-bold">Research this flower online</h2>
                      <p className="mt-2 text-sm leading-relaxed text-slate-600">
                        No static app can promise 100% exact species recognition for every flower in the world. These links help users verify the confirmed name with plant communities and public search.
                      </p>
                    </div>
                    <div className="grid gap-3 md:grid-cols-4">
                      <ResearchLink href={`https://www.inaturalist.org/search?q=${researchQuery}`} label="iNaturalist" detail="Community plant observations and taxonomy." />
                      <ResearchLink href={`https://www.google.com/search?tbm=isch&q=${researchQuery}%20flower`} label="Image search" detail="Compare the uploaded flower with public images." />
                      <ResearchLink href={`https://en.wikipedia.org/wiki/Special:Search?search=${researchQuery}`} label="Wikipedia" detail="Check botanical background and common names." />
                      <ResearchLink href={`https://www.instagram.com/explore/tags/${socialTag}/`} label="Social tag" detail="See public posts using this flower hashtag." />
                    </div>
                  </div>

                  <div className="glass rounded-lg p-6 shadow-sm">
                    <div className="mb-5 flex flex-wrap items-center justify-between gap-3">
                      <div>
                        <h2 className="text-3xl font-bold gradient-text">Uses for {activeFlower.species}</h2>
                        <p className="mt-1 text-slate-600">Useful ideas are shown only after the image passes flower detection.</p>
                      </div>
                      <Button icon={Download} onClick={downloadGuide} variant="soft">Download guide</Button>
                    </div>

                    <div className="space-y-6">
                      <div>
                        <h3 className="mb-3 text-xl font-bold text-leaf">Before wasted: fresh flower uses</h3>
                        <div className="grid gap-3 md:grid-cols-3">
                          {activeFlower.usesBefore.map((item) => <UseCard key={item[0]} item={item} kind="fresh" />)}
                        </div>
                      </div>
                      <div>
                        <h3 className="mb-3 text-xl font-bold text-bark">After wasted: dried flower uses</h3>
                        <div className="grid gap-3 md:grid-cols-3">
                          {activeFlower.usesAfter.map((item) => <UseCard key={item[0]} item={item} kind="dried" />)}
                        </div>
                      </div>
                    </div>
                  </div>
                </section>
              )}
            </main>
          </div>
        );
      };

      createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
