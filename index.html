        const flowers = Object.keys(flowerDatabase);

        let hash = 0;
        if (typeof imageData === 'string') {
          for (let i = 0; i < imageData.length && i < 100; i++) {
            hash = ((hash << 5) - hash) + imageData.charCodeAt(i);
            hash = hash & hash;
          }
        }
        const index = Math.abs(hash) % flowers.length;
        return flowers[index];

        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          // Apply wasted/dried effects: desaturate, darken, add brown tones
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            
            // Desaturate
            const gray = r * 0.299 + g * 0.587 + b * 0.114;
            const desaturation = 0.6; // 60% desaturated
            
            // Darken
            const darken = 0.75; // 75% of original brightness
            
            // Add brown/dried tones
            const brownTint = 0.15; // 15% brown tint
            
            data[i] = Math.min(255, (r * (1 - desaturation) + gray * desaturation) * darken + 60 * brownTint);
            data[i + 1] = Math.min(255, (g * (1 - desaturation) + gray * desaturation) * darken + 45 * brownTint);
            data[i + 2] = Math.min(255, (b * (1 - desaturation) + gray * desaturation) * darken + 30 * brownTint);
          }
          
          ctx.putImageData(imageData, 0, 0);
          callback(canvas.toDataURL());
        };
        img.src = imageSrc;
